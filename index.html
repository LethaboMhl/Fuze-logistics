<!DOCTYPE html>

<html lang="en">

<head>

  <meta charset="utf-8" />

  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>FUZE HOLDINGS &amp; LOGISTICS</title>



  <!-- Google Fonts (keep your original link here if needed) -->

  <!-- <link href="https://fonts.googleapis.com/..." rel="stylesheet"> -->



  <link rel="stylesheet" href="style.css" />

</head>

<body>

  <!-- Header -->

  <header class="header">

    <div class="logo">FUZE</div>

    <nav class="nav">

      <a href="#about">About</a>

      <a href="#fleet">Fleet</a>

      <a href="#contact">Contact</a>

    </nav>

  </header>



  <!-- Hero -->

  <section class="hero" id="home" aria-label="Homepage hero">

    <h1>FUZE HOLDINGS &amp; LOGISTICS</h1>

    <p>Your logistics partner</p>

  </section>



  <!-- About -->

  <section class="about" id="about">

    <div class="about-text">

      <h2>About Us</h2>

      <p>Short company intro goes here.</p>

    </div>

    <div class="about-media">

      <img src="trucks.jpeg" alt="Trucks in yard" />

    </div>

  </section>



  <!-- Fleet -->

  <section class="fleet" id="fleet">

    <div class="fleet-text">

      <h2>Our Fleet</h2>

      <p>Details about fleet...</p>

    </div>

    <div class="fleet-gallery">

      <img src="truck1.jpg" alt="Truck 1" />

      <img src="truck2.jpg" alt="Truck 2" />

    </div>

  </section>



  <!-- Showcase -->

  <section class="showcase" id="showcase">

    <h2>Showcase</h2>

    <div class="showcase-grid">

      <!-- cards / images -->

    </div>

  </section>



  <!-- Contact -->

  <section class="contact" id="contact">

    <h2>Contact</h2>



    <form id="contactForm" action="#" method="POST" class="contact-form" aria-describedby="messagePopup">

      <input type="hidden" name="_captcha" value="false" />

      <input type="hidden" name="_template" value="table" />



      <label>

        Full name

        <input type="text" name="name" placeholder="Full Name" required />

      </label>



      <label>

        Email

        <input type="email" name="email" placeholder="Email" required />

      </label>



      <label>

        Message

        <textarea name="message" placeholder="Your message" required></textarea>

      </label>



      <button type="submit">Send Message</button>

    </form>



    <!-- Message popup for JS feedback. aria-live for screen readers. -->

    <div id="messagePopup" class="message-popup" role="status" aria-live="polite" aria-atomic="true" hidden></div>

  </section>



  <footer>

    <p>&copy; FUZE HOLDINGS &amp; LOGISTICS</p>

  </footer>



  <!-- Form submission script -->

  <script>

    document.addEventListener("DOMContentLoaded", function () {

      const form = document.getElementById("contactForm");

      const popup = document.getElementById("messagePopup");



      if (!form || !popup) {

        // Safety: required elements not present

        return;

      }



      const button = form.querySelector("button[type='submit']");



      form.addEventListener("submit", async function (e) {

        e.preventDefault();



        if (button) {

          button.disabled = true;

        }



        const originalText = button ? button.textContent : "";

        if (button) {

          button.textContent = "Sending...";

        }



        const formData = new FormData(form);



        try {

          const response = await fetch(form.action || window.location.href, {

            method: "POST",

            body: formData,

          });



          if (!response.ok) {

            throw new Error("Submission failed: " + response.status);

          }



          popup.textContent = "Message sent successfully.";

          popup.hidden = false;

          popup.classList.add("show");



          form.reset();

        } catch (error) {

          popup.textContent = "Something went wrong. Try again.";

          popup.hidden = false;

          popup.classList.add("show");

          console.error(error);

        } finally {

          // Restore button and hide popup after delay

          setTimeout(function () {

            if (popup) {

              popup.classList.remove("show");

              popup.hidden = true;

            }

            if (button) {

              button.disabled = false;

              button.textContent = originalText;

            }

          }, 3000);

        }

      });

    });

  </script>

</body>

</html>
